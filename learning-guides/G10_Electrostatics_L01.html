<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G10ElectrostaticsL01</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #c8c8c8; font-family: 'EB Garamond', Georgia, serif; font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .fade { animation: fadeUp 0.4s ease forwards; }

  input[type=number]::-webkit-outer-spin-button { opacity: 1; }

<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;



const DS = {
  colors: {
    bg: "#0a0a0a", surface: "#111111", elevated: "#181818",
    border: "#222222", muted: "#2a2a2a", dim: "#555555",
    subtle: "#888888", body: "#c8c8c8", heading: "#efefef",
    accent: "#7eb8d4", accentAlt: "#a0d4b0", err: "#d47e8a",
    glow: "rgba(126,184,212,0.18)", glowStr: "rgba(126,184,212,0.5)",
  },
  font: {
    serif: "'EB Garamond', Georgia, serif",
    mono: "'JetBrains Mono', monospace",
  },
  radius: "4px",
};

const { colors: C, font: F } = DS;

const css = `
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: ${C.bg}; color: ${C.body}; font-family: ${F.serif}; font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: ${C.bg}; } ::-webkit-scrollbar-thumb { background: ${C.muted}; border-radius: 2px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .fade { animation: fadeUp 0.4s ease forwards; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 1; }
  input:focus { outline: none; }
`;

const Geo = () => (
  <svg style={{ position: "fixed", inset: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0 }}>
    <defs>
      <radialGradient id="rg1" cx="85%" cy="5%" r="35%"><stop offset="0%" stopColor="#7eb8d4" stopOpacity="0.05" /><stop offset="100%" stopColor="#7eb8d4" stopOpacity="0" /></radialGradient>
      <radialGradient id="rg2" cx="5%" cy="95%" r="30%"><stop offset="0%" stopColor="#a0d4b0" stopOpacity="0.04" /><stop offset="100%" stopColor="#a0d4b0" stopOpacity="0" /></radialGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#rg1)" /><rect width="100%" height="100%" fill="url(#rg2)" />
    <g opacity="0.06" stroke="#7eb8d4" strokeWidth="0.6" fill="none">
      <polygon points="820,15 900,70 740,70" /><polygon points="900,70 960,15 960,125" />
      <line x1="820" y1="15" x2="820" y2="125" /><line x1="740" y1="70" x2="960" y2="70" />
    </g>
    <g opacity="0.045" stroke="#a0d4b0" strokeWidth="0.5" fill="none">
      {[80, 140, 200, 260].map((r, i) => <circle key={i} cx="50" cy="95%" r={r} />)}
    </g>
    <g opacity="0.02" stroke="#7eb8d4" strokeWidth="0.4">
      {Array.from({ length: 18 }).map((_, i) => <line key={`h${i}`} x1="0" y1={i * 60} x2="100%" y2={i * 60} />)}
      {Array.from({ length: 24 }).map((_, i) => <line key={`v${i}`} x1={i * 80} y1="0" x2={i * 80} y2="100%" />)}
    </g>
  </svg>
);

const Card = ({ children, style = {} }) => (
  <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: DS.radius, padding: "22px 26px", position: "relative", overflow: "hidden", ...style }}>
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 1, background: `linear-gradient(90deg,transparent,${C.accent}44,transparent)` }} />
    {children}
  </div>
);

const Label = ({ children, style = {} }) => (
  <span style={{ fontFamily: F.mono, fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: C.dim, ...style }}>{children}</span>
);

const Mono = ({ children, style = {} }) => (
  <span style={{ fontFamily: F.mono, fontSize: 12, fontWeight: 300, color: C.subtle, ...style }}>{children}</span>
);

const Tag = ({ children, accent = false, alt = false }) => (
  <span style={{ fontFamily: F.mono, fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", padding: "2px 7px", borderRadius: DS.radius, border: `1px solid ${alt ? C.accentAlt+"44" : accent ? C.accent+"44" : C.border}`, color: alt ? C.accentAlt : accent ? C.accent : C.dim }}>{children}</span>
);

const Rule = () => <div style={{ borderTop: `1px solid ${C.border}`, margin: "18px 0" }} />;

const MathBlock = ({ children }) => (
  <div style={{ fontFamily: F.mono, fontSize: 14, fontWeight: 300, background: C.bg, border: `1px solid ${C.border}`, borderLeft: `2px solid ${C.accent}88`, borderRadius: DS.radius, padding: "12px 16px", color: C.subtle, letterSpacing: "0.03em", lineHeight: 2, whiteSpace: "pre" }}>{children}</div>
);

const InfoRow = ({ label, value, accent = false }) => (
  <div style={{ display: "flex", gap: 16, padding: "9px 0", borderBottom: `1px solid ${C.border}`, alignItems: "baseline" }}>
    <Mono style={{ minWidth: 200, color: C.dim, flexShrink: 0, fontSize: 11 }}>{label}</Mono>
    <span style={{ fontFamily: F.serif, fontSize: 14, color: accent ? C.accent : C.body, lineHeight: 1.5 }}>{value}</span>
  </div>
);

const Dots = ({ filled = 1 }) => (
  <span style={{ display: "inline-flex", gap: 3 }}>
    {[1,2,3].map(i => <span key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: i <= filled ? C.accent : C.muted, boxShadow: i <= filled ? `0 0 4px ${C.glowStr}` : "none" }} />)}
  </span>
);

const PartSummary = ({ intro, points }) => (
  <div style={{ padding: "16px 18px", background: C.elevated, border: `1px solid ${C.accent}33`, borderLeft: `2px solid ${C.accent}88`, borderRadius: DS.radius }}>
    <Label style={{ display: "block", marginBottom: 10, color: C.accent }}>Summary</Label>
    {intro && <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.65, marginBottom: points ? 12 : 0 }}>{intro}</p>}
    {points && <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>{points.map((p, i) => <div key={i} style={{ display: "flex", gap: 10 }}><Mono style={{ color: C.accent, minWidth: 14, fontSize: 11, flexShrink: 0 }}>{i + 1}.</Mono><span style={{ fontFamily: F.serif, fontSize: 13, color: C.dim, lineHeight: 1.55 }}>{p}</span></div>)}</div>)}
  </div>
);

const CompNote = ({ children }) => (
  <div style={{ padding: "12px 16px", background: C.bg, border: `1px solid ${C.accentAlt}33`, borderLeft: `2px solid ${C.accentAlt}77`, borderRadius: DS.radius }}>
    <Label style={{ color: C.accentAlt, display: "block", marginBottom: 8 }}>Competition Insight</Label>
    <div style={{ fontFamily: F.serif, fontSize: 13, color: C.dim, lineHeight: 1.7 }}>{children}</div>
  </div>
);

function MCField({ question, choices, correct, pts = 3, diff = 1, explain }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [showExplain, setShowExplain] = useState(false);
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}><div style={{ display: "flex", gap: 8, alignItems: "center" }}><Tag>MC</Tag><Dots filled={diff} /></div><Mono style={{ fontSize: 10 }}>{pts} pts</Mono></div>
      <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.65, marginBottom: 14 }}>{question}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
        {choices.map((ch, i) => {
          const L = ["A","B","C","D"][i], on = selected === i;
          const ok = revealed && i === correct, bad = revealed && on && i !== correct;
          return (<div key={i} onClick={() => !revealed && setSelected(i)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", border: `1px solid ${ok ? C.accentAlt+"aa" : bad ? C.err+"88" : on ? C.accent+"88" : C.border}`, borderRadius: DS.radius, cursor: revealed ? "default" : "pointer", background: ok ? C.accentAlt+"0e" : bad ? C.err+"0e" : on ? C.accent+"0e" : "transparent", boxShadow: on ? `0 0 12px ${C.glow}` : "none", transition: "all 0.18s ease" }}><Mono style={{ fontSize: 10, color: on ? C.accent : C.dim, minWidth: 14 }}>{L}</Mono><span style={{ fontFamily: F.serif, fontSize: 14, color: ok ? C.accentAlt : bad ? C.err : on ? C.accent : C.body, flex: 1, lineHeight: 1.5 }}>{ch}</span>{ok && <Mono style={{ fontSize: 9, color: C.accentAlt }}>вњ“</Mono>}{bad && <Mono style={{ fontSize: 9, color: C.err }}>вњ—</Mono>}</div>);
        })}
      </div>
      {selected !== null && (
        <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
          {!revealed && <button onClick={() => setRevealed(true)} style={{ fontFamily: F.serif, fontSize: 13, padding: "5px 14px", borderRadius: DS.radius, border: `1px solid ${C.accent}55`, background: "transparent", color: C.accent, cursor: "pointer" }}>Check</button>}
          <button onClick={() => { setSelected(null); setRevealed(false); setShowExplain(false); }} style={{ fontFamily: F.serif, fontSize: 13, padding: "5px 14px", borderRadius: DS.radius, border: `1px solid ${C.border}`, background: "transparent", color: C.subtle, cursor: "pointer" }}>Clear</button>
          {revealed && explain && <button onClick={() => setShowExplain(v => !v)} style={{ fontFamily: F.serif, fontSize: 13, padding: "5px 14px", borderRadius: DS.radius, border: `1px solid ${C.border}`, background: "transparent", color: C.subtle, cursor: "pointer" }}>{showExplain ? "Hide" : "Explain"}</button>}
        </div>
      )}
      {showExplain && explain && <div style={{ marginTop: 10, padding: "10px 14px", background: C.bg, border: `1px solid ${C.border}`, borderLeft: `2px solid ${C.accent}88`, borderRadius: DS.radius }}><p style={{ fontFamily: F.serif, fontSize: 13, color: C.dim, lineHeight: 1.65 }}>{explain}</p></div>}
    </div>
  );
}

function INTField({ question, answer, pts = 4, diff = 2, hint }) {
  const [val, setVal] = useState("");
  const [checked, setChecked] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const correct = parseInt(val) === answer;
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}><div style={{ display: "flex", gap: 8, alignItems: "center" }}><Tag>INT</Tag><Dots filled={diff} /></div><Mono style={{ fontSize: 10 }}>{pts} pts</Mono></div>
      <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.65, marginBottom: 14 }}>{question}</p>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <input type="number" min="0" max="9999" value={val} placeholder="0" onChange={e => { setVal(e.target.value); setChecked(false); }} style={{ width: 96, padding: "10px 14px", borderRadius: DS.radius, border: `1px solid ${checked ? (correct ? C.accentAlt+"99" : C.err+"88") : C.border}`, background: checked ? (correct ? C.accentAlt+"0a" : C.err+"0a") : C.bg, color: checked ? (correct ? C.accentAlt : C.err) : C.heading, fontFamily: F.mono, fontSize: 22, fontWeight: 300, textAlign: "right", boxShadow: val ? `0 0 10px ${C.glow}` : "none", transition: "all 0.2s" }} />
        <div><Mono style={{ fontSize: 9, letterSpacing: "0.12em", display: "block" }}>INTEGER В· 0вЂ“9999</Mono>{checked && <Mono style={{ fontSize: 9, display: "block", marginTop: 3, color: correct ? C.accentAlt : C.err }}>{correct ? "вњ“ correct" : "вњ— try again"}</Mono>}</div>
      </div>
      {val !== "" && (
        <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
          {!checked && <button onClick={() => setChecked(true)} style={{ fontFamily: F.serif, fontSize: 13, padding: "5px 14px", borderRadius: DS.radius, border: `1px solid ${C.accent}55`, background: "transparent", color: C.accent, cursor: "pointer" }}>Check</button>}
          <button onClick={() => { setVal(""); setChecked(false); setShowHint(false); }} style={{ fontFamily: F.serif, fontSize: 13, padding: "5px 14px", borderRadius: DS.radius, border: `1px solid ${C.border}`, background: "transparent", color: C.subtle, cursor: "pointer" }}>Clear</button>
          {hint && <button onClick={() => setShowHint(v => !v)} style={{ fontFamily: F.serif, fontSize: 13, padding: "5px 14px", borderRadius: DS.radius, border: `1px solid ${C.border}`, background: "transparent", color: C.subtle, cursor: "pointer" }}>{showHint ? "Hide hint" : "Hint"}</button>}
        </div>
      )}
      {showHint && hint && <div style={{ marginTop: 10, padding: "9px 13px", background: C.bg, border: `1px solid ${C.border}`, borderLeft: `2px solid ${C.accent}88`, borderRadius: DS.radius }}><p style={{ fontFamily: F.serif, fontSize: 13, color: C.dim, lineHeight: 1.6, fontStyle: "italic" }}>{hint}</p></div>}
    </div>
  );
}

const MAIN_TABS = ["lecture", "practice", "reference"];
const PART_LABELS = ["I В· Coulomb's Law", "II В· Electric Field", "III В· Potential & Energy"];

function G10ElectrostaticsL01() {
  const [tab, setTab] = useState("lecture");
  const [part, setPart] = useState(0);

  const tabBtn = t => ({ fontFamily: F.serif, fontSize: 13, padding: "5px 13px", borderRadius: DS.radius, border: `1px solid ${tab === t ? C.accent+"55" : "transparent"}`, background: "transparent", color: tab === t ? C.accent : C.subtle, cursor: "pointer", transition: "all 0.2s" });
  const partBtn = i => ({ fontFamily: F.mono, fontSize: 9, letterSpacing: "0.1em", padding: "4px 10px", borderRadius: DS.radius, border: `1px solid ${part === i ? C.accent+"55" : C.border}`, background: part === i ? C.accent+"11" : "transparent", color: part === i ? C.accent : C.dim, cursor: "pointer", transition: "all 0.2s" });
  const navBtn = (accent = false) => ({ fontFamily: F.serif, fontSize: 13, padding: "6px 16px", borderRadius: DS.radius, border: `1px solid ${accent ? C.accent+"55" : C.border}`, background: "transparent", color: accent ? C.accent : C.subtle, cursor: "pointer" });

  return (<>
    <style>{css}</style><Geo />
    <div style={{ position: "relative", zIndex: 1, maxWidth: 820, margin: "0 auto", padding: "44px 20px 80px" }}>

      <div className="fade" style={{ marginBottom: 36 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}><Tag>Physics</Tag><Tag accent>Electrostatics</Tag><Tag>Block 9</Tag></div>
        <h1 style={{ fontFamily: F.serif, fontSize: "clamp(26px,4vw,42px)", fontWeight: 500, color: C.heading, letterSpacing: "-0.02em", lineHeight: 1.2, marginBottom: 10, textShadow: `0 0 24px ${C.glowStr}` }}>Electrostatics &<br /><em>Vector Fields</em></h1>
        <p style={{ fontFamily: F.serif, fontSize: 15, color: C.dim, fontStyle: "italic" }}>Charge is the source of the electric field. From Coulomb's inverse-square law, we build the field concept вЂ” one of the most powerful abstractions in all of physics.</p>
      </div>

      <Card style={{ marginBottom: 24 }}>
        <Label style={{ display: "block", marginBottom: 12 }}>What This Covers</Label>
        <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.75, marginBottom: 14 }}>
          Electrostatics is the study of stationary charges and the fields they create. The electric field E is a <strong style={{ fontWeight: 500, color: C.accent }}>vector field</strong> вЂ” at every point in space, it has both magnitude and direction. This is where your vector skills from G9 become essential: calculating the net field at a point requires vector superposition of contributions from every charge in the system.
        </p>
        <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.75, marginBottom: 14 }}>
          We build from Coulomb's force law в†’ electric field в†’ electric potential в†’ energy. Each step abstracts one layer further from the raw force between charges, but each abstraction makes the physics more powerful.
        </p>
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>{["I В· Coulomb's Law", "II В· Electric Field", "III В· Potential & Energy"].map((p, i) => <Tag key={i}>{p}</Tag>)}</div>
      </Card>

      <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>{MAIN_TABS.map(t => <button key={t} onClick={() => setTab(t)} style={tabBtn(t)}>{t}</button>)}</div>
      <div style={{ borderTop: `1px solid ${C.accent}44`, marginBottom: 28 }} />

      {tab === "lecture" && (
        <div className="fade">
          <div style={{ display: "flex", gap: 3, marginBottom: 22, flexWrap: "wrap" }}>{PART_LABELS.map((lbl, i) => <button key={i} onClick={() => setPart(i)} style={partBtn(i)}>{lbl}</button>)}</div>

          {/* в”Ђв”Ђ PART I: Coulomb's Law в”Ђв”Ђ */}
          {part === 0 && (<div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <PartSummary intro="Coulomb's law is the electric analogue of Newton's law of gravitation вЂ” both are inverse-square laws. But where gravity only attracts, the electric force can attract or repel, and it is vastly stronger." points={["Coulomb's Law: F = kВ·|qв‚Ѓqв‚‚|/rВІ. Direction: along the line joining charges. Like charges repel; unlike attract.", "k = 8.99 Г— 10вЃ№ NВ·mВІ/CВІ вЂ” the Coulomb constant. Compare to G = 6.67 Г— 10вЃ»В№В№: the electric force is ~10ВівЃ№ times stronger than gravity between two protons.", "Charge is quantized: q = nВ·e where e = 1.602 Г— 10вЃ»В№вЃ№ C. Every observable charge is an integer multiple of the elementary charge.", "Force is a vector вЂ” direction matters. For multiple charges, use vector superposition: F_net = ОЈ F_i."]} />

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Coulomb's Law вЂ” Formal Statement</Label>
              <MathBlock>{"F = k В· |qв‚Ѓ qв‚‚| / rВІ\n\nk = 1/(4ПЂОµв‚Ђ) = 8.99 Г— 10вЃ№ NВ·mВІ/CВІ\nОµв‚Ђ = 8.85 Г— 10вЃ»В№ВІ CВІ/(NВ·mВІ)     permittivity of free space\n\nDirection: F is along rМ‚ (unit vector joining qв‚Ѓ to qв‚‚)\nAttractive for opposite signs; repulsive for same signs"}</MathBlock>
              <div style={{ marginTop: 14 }}>
                <Label style={{ display: "block", marginBottom: 10 }}>Comparison: Coulomb vs. Gravity</Label>
                {[["Force law", "F = kВ·qв‚Ѓqв‚‚/rВІ   vs.   F = GВ·mв‚Ѓmв‚‚/rВІ"], ["Constant magnitude", "k в‰€ 9Г—10вЃ№   vs.   G в‰€ 6.7Г—10вЃ»В№В№"], ["Between two protons", "F_e/F_g в‰€ 10ВівЃ№ вЂ” electric dominates utterly"], ["Sign", "Attractive or repulsive   vs.   always attractive"]].map(([k, v]) => <InfoRow key={k} label={k} value={v} />)}
              </div>
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Vector Superposition</Label>
              <p style={{ fontFamily: F.serif, fontSize: 15, color: C.body, lineHeight: 1.75, marginBottom: 14 }}>
                When more than two charges are present, the force on any one charge is the <strong style={{ fontWeight: 500, color: C.accent }}>vector sum</strong> of the forces from all other charges. This is the superposition principle вЂ” forces from different sources add independently.
              </p>
              <MathBlock>{"Fв‚Ѓ = Fв‚Ѓв‚‚ + Fв‚Ѓв‚ѓ + Fв‚Ѓв‚„ + ...\n\nFв‚Ѓ = kВ·qв‚Ѓ В· ОЈ(q_i В· rМ‚в‚Ѓбµў / rв‚ЃбµўВІ)\n\nEach term: magnitude from Coulomb, direction along rМ‚"}</MathBlock>
              <p style={{ fontFamily: F.serif, fontSize: 14, color: C.dim, marginTop: 10, lineHeight: 1.65 }}>
                This is where the G9 vector component method becomes essential. For charges not collinear, resolve each force into x and y components, sum components, then reconstruct magnitude and direction of F_net.
              </p>
            </Card>

            <CompNote>
              <p><strong>Three-body electrostatics:</strong> In competition problems, the equilibrium of three collinear charges is a classic setup. For charge qв‚‚ between qв‚Ѓ and qв‚ѓ to be in equilibrium: Fв‚Ѓв‚‚ + Fв‚ѓв‚‚ = 0 в†’ qв‚Ѓ/xВІ = в€’qв‚ѓ/(dв€’x)ВІ. The ratio of distances equals the square root of the charge ratio. This generalizes to the <strong>earthing problem</strong> вЂ” when one charge is free to move, equilibrium positions are found by setting net force to zero, solving the resulting algebraic equation. These problems require careful sign handling and often yield surprising solutions where a stable equilibrium requires the middle charge to have the opposite sign.</p>
            </CompNote>

            <Card><MCField question="Two point charges, +3 ОјC and в€’4 ОјC, are 0.20 m apart. What is the magnitude of the force between them?" choices={["0.27 N", "2.7 N", "27 N", "0.54 N"]} correct={1} diff={2} pts={4} explain="F = kВ·|qв‚Ѓqв‚‚|/rВІ = (9Г—10вЃ№)(3Г—10вЃ»вЃ¶)(4Г—10вЃ»вЃ¶)/(0.20)ВІ = (9Г—10вЃ№)(12Г—10вЃ»В№ВІ)/0.04 = (0.108)/0.04 = 2.7 N. The sign only tells direction: opposite charges в†’ attractive." /></Card>
          </div>)}

          {/* в”Ђв”Ђ PART II: Electric Field в”Ђв”Ђ */}
          {part === 1 && (<div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <PartSummary intro="The electric field E at a point is the force per unit charge that a small positive test charge would experience there. The field exists whether or not a test charge is present вЂ” it is a property of space itself, created by source charges." points={["E = F/qв‚Ђ вЂ” force per unit test charge. Units: N/C (equivalent to V/m).", "For a point charge Q: E = kВ·Q/rВІ, directed radially outward if Q &gt; 0, inward if Q &lt; 0.", "Field lines start on positive charges and end on negative charges. Density of lines в€ќ field strength.", "E obeys superposition: E_net = ОЈ E_i вЂ” the vector sum of fields from all source charges."]} />

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Electric Field Definition</Label>
              <MathBlock>{"E = F / qв‚Ђ               definition\n\nFor a point charge Q at distance r:\nE = k В· Q / rВІ            magnitude\nE = k В· Q В· rМ‚ / rВІ        vector form\n\nDirection: radially outward from +Q\n          radially inward toward в€’Q"}</MathBlock>
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Field of Charge Distributions</Label>
              <p style={{ fontFamily: F.serif, fontSize: 15, color: C.body, lineHeight: 1.75, marginBottom: 14 }}>
                For continuous charge distributions, the field is the integral of contributions from infinitesimal charge elements dq:
              </p>
              <MathBlock>{"E = в€« kВ·dq / rВІ В· rМ‚\n\ndq = О»В·dx      linear charge density О» (C/m)\ndq = ПѓВ·dA      surface charge density Пѓ (C/mВІ)\ndq = ПЃВ·dV      volume charge density ПЃ (C/mВі)"}</MathBlock>
              <div style={{ marginTop: 14 }}>{[["Infinite line charge", "E = 2kО»/r = О»/(2ПЂОµв‚Ђr) вЂ” falls as 1/r"], ["Infinite plane", "E = Пѓ/(2Оµв‚Ђ) вЂ” constant! Independent of distance"], ["Conducting plate", "E = Пѓ/Оµв‚Ђ вЂ” twice the non-conducting plane"], ["Uniformly charged sphere", "E = kQ/rВІ outside, E = kQr/RВі inside (r &lt; R)"]].map(([k, v]) => <InfoRow key={k} label={k} value={v} />)}</div>
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Gauss's Law вЂ” Intuition</Label>
              <p style={{ fontFamily: F.serif, fontSize: 15, color: C.body, lineHeight: 1.75, marginBottom: 14 }}>
                Gauss's Law states that the net electric flux through any closed surface equals the enclosed charge divided by Оµв‚Ђ:
              </p>
              <MathBlock>{"О¦_E = в€® EВ·dA = Q_enclosed / Оµв‚Ђ\n\nFlux = (field strength) Г— (perpendicular area)\nOnly the component of E perpendicular to the\nsurface contributes to the flux."}</MathBlock>
              <p style={{ fontFamily: F.serif, fontSize: 15, color: C.body, lineHeight: 1.75, marginTop: 14 }}>
                For symmetric charge distributions (spherical, cylindrical, planar), Gauss's Law reduces the calculation of E to simple algebra. Choose a Gaussian surface where E is constant in magnitude and perpendicular (or parallel) to the surface everywhere, and the flux integral collapses.
              </p>
            </Card>

            <CompNote>
              <p><strong>Field superposition in 2D:</strong> Given charges qв‚Ѓ at (xв‚Ѓ, yв‚Ѓ) and qв‚‚ at (xв‚‚, yв‚‚), the field at point P(x, y) is E = Eв‚Ѓ + Eв‚‚. Each Eбµў = kВ·qбµў/rбµўВІ В· rМ‚бµў, where rбµў = distance from qбµў to P. This is a pure vector exercise: compute components E_x = Eв‚ЃcosОёв‚Ѓ + Eв‚‚cosОёв‚‚, E_y = Eв‚ЃsinОёв‚Ѓ + Eв‚‚sinОёв‚‚. The direction of E_net is Оё = arctan(E_y/E_x). These calculations appear routinely in competition вЂ” the physics is Coulomb; the difficulty is vector algebra. Coordinate geometry from G9 math becomes the computational tool.</p>
            </CompNote>

            <Card><MCField question="Two equal positive charges +Q are placed at (-a, 0) and (+a, 0). What is the direction of the electric field at the midpoint (0, 0)?" choices={["Points right (+x)", "Points left (в€’x)", "Points up (+y)", "Zero вЂ” fields cancel exactly"]} correct={3} diff={1} pts={3} explain="At the midpoint, the fields from the two charges have equal magnitude but opposite directions. The left charge produces E pointing right; the right charge produces E pointing left. They cancel: E_net = 0. For equal charges, the midpoint is a field null point." /></Card>
          </div>)}

          {/* в”Ђв”Ђ PART III: Potential & Energy в”Ђв”Ђ */}
          {part === 2 && (<div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <PartSummary intro="Electric potential V is the scalar companion to the vector field E. While E tells you the force direction at every point, V tells you the energy landscape вЂ” and being a scalar, superposition is simple arithmetic." points={["Electric potential V = kВ·Q/r for a point charge. Units: volts (V = J/C).", "V is a scalar field вЂ” superposition means simple addition, no vector components needed.", "О”V = в€’в€«EВ·dl вЂ” the potential difference between two points is the negative line integral of E.", "Electrostatic potential energy U = qВ·V = kВ·qв‚Ѓqв‚‚/r. The work done by the field W = в€’О”U."]} />

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Electric Potential</Label>
              <MathBlock>{"V = k В· Q / r              point charge potential\n\nV_net = ОЈ kВ·Q_i / r_i       scalar superposition\n\nО”V = V_B в€’ V_A = в€’в€«_A^B EВ·dl\n\nFor uniform field E: О”V = в€’EВ·d"}</MathBlock>
              <p style={{ fontFamily: F.serif, fontSize: 14, color: C.dim, marginTop: 10, lineHeight: 1.65 }}>Potential is defined up to an additive constant вЂ” only potential differences have physical meaning. Convention: V(в€ћ) = 0 for a finite charge distribution.</p>
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Equipotential Surfaces</Label>
              <p style={{ fontFamily: F.serif, fontSize: 15, color: C.body, lineHeight: 1.75, marginBottom: 14 }}>
                An equipotential surface is a surface on which V is constant. Key properties:
              </p>
              {[["E вџ‚ equipotential", "Electric field lines are always perpendicular to equipotential surfaces. If they weren't, there'd be a component of E along the surface, which would do work and change V вЂ” contradiction."], ["No work on equipotential", "Moving a charge along an equipotential requires zero work. W = qВ·О”V = 0."], ["Spacing = field strength", "Closely spaced equipotentials в†’ strong E. Widely spaced в†’ weak E. E в‰€ в€’О”V/О”x."], ["Point charge surfaces", "Concentric spheres. V = kQ/r в†’ r = kQ/V вЂ” each sphere corresponds to a specific potential."]].map(([k, v]) => <InfoRow key={k} label={k} value={v} />)}
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Electrostatic Potential Energy</Label>
              <MathBlock>{"U = q В· V                  energy of charge q at potential V\n\nU = k В· qв‚Ѓqв‚‚ / r           PE of two point charges\n\nU_system = ОЈ_(i<j) kВ·q_iВ·q_j / r_ij\ntotal PE of a configuration\n\nW_ext = О”U = U_final в€’ U_initial\nwork done by external agent"}</MathBlock>
              <p style={{ fontFamily: F.serif, fontSize: 14, color: C.dim, marginTop: 10, lineHeight: 1.65 }}>The close analogy is gravitational potential energy U = mgh. But where gravity only involves one sign of "charge" (mass), the electric potential energy can be positive (repulsion) or negative (attraction). A bound system вЂ” like an electron orbiting a nucleus вЂ” has negative total potential energy.</p>
            </Card>

            <CompNote>
              <p><strong>Earnshaw's Theorem:</strong> A point charge cannot be maintained in stable equilibrium by electrostatic forces alone. This follows from Gauss's Law: in a charge-free region, V satisfies Laplace's equation в€‡ВІV = 0, and such functions have no local minima or maxima вЂ” only saddle points. This is why ion traps use time-varying fields (Paul traps) or magnetic fields (Penning traps). In competition, expect problems that appear to find stable electrostatic equilibrium вЂ” the theorem ensures such solutions must involve constraints, non-electrostatic forces, or dynamic fields.</p>
            </CompNote>

            <Card><MCField question="A +2 ОјC point charge is fixed at the origin. What is the electric potential at a distance r = 0.30 m? Use k = 9Г—10вЃ№." choices={["6.0Г—10Ві V", "6.0Г—10вЃґ V", "6.0Г—10вЃµ V", "1.8Г—10вЃµ V"]} correct={1} diff={1} pts={3} explain="V = kQ/r = (9Г—10вЃ№)(2Г—10вЃ»вЃ¶)/(0.30) = 18Г—10Ві/0.30 = 6.0Г—10вЃґ V." /></Card>
          </div>)}

          <div style={{ marginTop: 24, display: "flex", justifyContent: "space-between" }}>
            {part > 0 ? <button onClick={() => setPart(p => p - 1)} style={navBtn(false)}>в†ђ {PART_LABELS[part - 1]}</button> : <span />}
            {part < 2 ? <button onClick={() => setPart(p => p + 1)} style={navBtn(true)}>{PART_LABELS[part + 1]} в†’</button> : <button onClick={() => setTab("practice")} style={navBtn(true)}>Practice в†’</button>}
          </div>
        </div>
      )}

      {tab === "practice" && (<div className="fade" style={{ display: "flex", flexDirection: "column", gap: 20 }}>

        <Card><MCField question="The electric force between two charges is F at separation r. What is the force at separation 3r?" choices={["F/9", "F/3", "3F", "9F"]} correct={0} diff={1} pts={3} explain="Coulomb's Law: F в€ќ 1/rВІ. Tripling r reduces F by factor 3ВІ = 9 в†’ F' = F/9." /></Card>
        <Card><INTField question="Two charges qв‚Ѓ = +5 ОјC and qв‚‚ = в€’3 ОјC are 0.15 m apart. Find the magnitude of the force in newtons, rounded to the nearest integer. Use k = 9Г—10вЃ№." answer={6} diff={2} pts={4} hint="F = k|qв‚Ѓqв‚‚|/rВІ = (9Г—10вЃ№)(5Г—10вЃ»вЃ¶)(3Г—10вЃ»вЃ¶)/(0.15)ВІ = (9Г—10вЃ№)(15Г—10вЃ»В№ВІ)/0.0225 = 0.135/0.0225 = 6.0 N." /></Card>

      </div>)}

        </Card>

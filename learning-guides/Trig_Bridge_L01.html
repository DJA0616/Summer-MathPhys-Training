const { colors: C, font: F } = DS;

const css = `

  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: ${C.muted}; border-radius: 1px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: ${C.accent}; cursor: pointer; box-shadow: 0 0 6px ${C.glow}; }

// ─────────────────────────────────────────────────────────────
// LAYOUT PRIMITIVES
// ─────────────────────────────────────────────────────────────

        <stop offset="100%" stopColor="#7eb8d4" stopOpacity="0" />
      </radialGradient>

        <stop offset="100%" stopColor="#a0d4b0" stopOpacity="0" />

    </defs>
    <rect width="100%" height="100%" fill="url(#rg1)" />

    <g opacity="0.06" stroke="#7eb8d4" strokeWidth="0.6" fill="none">

      <polygon points="900,70 960,15 960,125" />

    <g opacity="0.045" stroke="#a0d4b0" strokeWidth="0.5" fill="none">

      {Array.from({ length: 24 }).map((_, i) => <line key={`v${i}`} x1={i * 80} y1="0" x2={i * 80} y2="100%" />)}

// ─────────────────────────────────────────────────────────────
// INTERACTIVE — CIRCLE → WAVE ANIMATION
// ─────────────────────────────────────────────────────────────
function CircleWave() {
  const cvRef = useRef(null);
  const speedRef = useRef(1);
  const pausedRef = useRef(false);
  const showCosRef = useRef(true);
  const angleRef = useRef(0);
  const lastTRef = useRef(null);
  const hSin = useRef([]);
  const hCos = useRef([]);
  const [speed, setSpeed] = useState(1);
  const [paused, setPaused] = useState(false);
  const [showCos, setShowCos] = useState(true);

  useEffect(() => {
    const cv = cvRef.current;
    if (!cv) return;
    const ctx = cv.getContext("2d");
    const W = 640, H = 260;
    const MAX = 360;

    // canvas color palette — always dark (project DS is dark)
    const CC = {
      ax:  "rgba(126,184,212,0.13)",
      ci:  "rgba(126,184,212,0.10)",
      dot: "#efefef",
      rad: "rgba(239,239,239,0.34)",
      sinC: "#7eb8d4",
      cosC: "#a0d4b0",
      sp:  "rgba(126,184,212,0.38)",
      cp:  "rgba(160,212,176,0.38)",
      lbl: "rgba(239,239,239,0.34)",
      dv:  "rgba(255,255,255,0.07)",
    };

    const CX = 108, CY = 130, R = 84;
    const WX = 228, WY = 130, WW = 390;

    let rafId;

    function frame(ts) {
      if (!pausedRef.current) {
        if (lastTRef.current !== null) angleRef.current += (ts - lastTRef.current) / 1000 * speedRef.current;
        lastTRef.current = ts;
      } else {
        lastTRef.current = null;
      }

      const ang = angleRef.current;
      const px = CX + R * Math.cos(ang);
      const py = CY - R * Math.sin(ang);

      hSin.current.unshift(Math.sin(ang));
      hCos.current.unshift(Math.cos(ang));
      if (hSin.current.length > MAX) { hSin.current.pop(); hCos.current.pop(); }

      ctx.clearRect(0, 0, W, H);

      // Circle axes
      ctx.strokeStyle = CC.ax; ctx.lineWidth = 0.5; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(CX - R - 10, CY); ctx.lineTo(CX + R + 10, CY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(CX, CY - R - 10); ctx.lineTo(CX, CY + R + 10); ctx.stroke();

      // Unit circle
      ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.strokeStyle = CC.ci; ctx.lineWidth = 1; ctx.stroke();

      // Projection dashes
      ctx.setLineDash([4, 3]); ctx.lineWidth = 1;
      ctx.strokeStyle = CC.sp;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, CY); ctx.stroke();
      if (showCosRef.current) {
        ctx.strokeStyle = CC.cp;
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(CX, py); ctx.stroke();
      }

      // Leader: circle point → wave lead dot
      ctx.strokeStyle = CC.sp; ctx.lineWidth = 0.7;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(WX, WY - Math.sin(ang) * R * 0.87); ctx.stroke();
      ctx.setLineDash([]);

      // Radius line
      ctx.strokeStyle = CC.rad; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(px, py); ctx.stroke();

      // Projection axis dots
      ctx.fillStyle = CC.sp; ctx.beginPath(); ctx.arc(px, CY, 3, 0, Math.PI * 2); ctx.fill();
      if (showCosRef.current) {
        ctx.fillStyle = CC.cp; ctx.beginPath(); ctx.arc(CX, py, 3, 0, Math.PI * 2); ctx.fill();
      }

      // Rotating point
      ctx.fillStyle = CC.dot; ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();

      // Divider
      ctx.strokeStyle = CC.dv; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(WX - 8, 14); ctx.lineTo(WX - 8, H - 14); ctx.stroke();

      // Wave axis
      ctx.strokeStyle = CC.ax; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(WX, WY); ctx.lineTo(W - 8, WY); ctx.stroke();

      const step = WW / MAX;

      // sin trace
      ctx.beginPath(); ctx.strokeStyle = CC.sinC; ctx.lineWidth = 1.8;
      hSin.current.forEach((v, i) => {
        const wx = WX + i * step, wy = WY - v * R * 0.87;
        i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
      });
      ctx.stroke();

      // cos trace
      if (showCosRef.current) {
        ctx.beginPath(); ctx.strokeStyle = CC.cosC; ctx.lineWidth = 1.8;
        hCos.current.forEach((v, i) => {
          const wx = WX + i * step, wy = WY - v * R * 0.87;
          i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
        });
        ctx.stroke();
      }

      // Lead dots on wave
      if (hSin.current.length > 0) {
        ctx.fillStyle = CC.sinC; ctx.beginPath(); ctx.arc(WX, WY - hSin.current[0] * R * 0.87, 4, 0, Math.PI * 2); ctx.fill();
        if (showCosRef.current) {
          ctx.fillStyle = CC.cosC; ctx.beginPath(); ctx.arc(WX, WY - hCos.current[0] * R * 0.87, 4, 0, Math.PI * 2); ctx.fill();
        }
      }

      // θ label
      ctx.font = "11px monospace"; ctx.fillStyle = CC.lbl; ctx.textAlign = "left";
      ctx.fillText("θ", CX + 22, CY - 10);

      rafId = requestAnimationFrame(frame);
    }

    rafId = requestAnimationFrame(frame);
    return () => cancelAnimationFrame(rafId);
  }, []);

  const handlePause = () => { pausedRef.current = !pausedRef.current; setPaused(p => !p); };
  const handleSpeed = (e) => { speedRef.current = parseFloat(e.target.value); setSpeed(parseFloat(e.target.value)); };
  const handleCosToggle = () => { showCosRef.current = !showCosRef.current; setShowCos(v => !v); };

  const btnStyle = { fontFamily: F.serif, fontSize: 13, padding: "4px 12px", borderRadius: DS.radius, border: `1px solid ${C.border}`, background: "transparent", color: C.subtle, cursor: "pointer" };

  return (
    <div style={{ background: C.elevated, border: `1px solid ${C.border}`, borderRadius: DS.radius, overflow: "hidden" }}>
      <canvas ref={cvRef} width={640} height={260} style={{ display: "block", width: "100%" }} />
      <div style={{ padding: "10px 16px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Label>Speed</Label>
          <input type="range" min="0.2" max="3" step="0.1" value={speed} onChange={handleSpeed} style={{ width: 90 }} />
          <Mono style={{ fontSize: 11, minWidth: 22 }}>{speed.toFixed(1)}×</Mono>
        </div>
        <button onClick={handlePause} style={btnStyle}>{paused ? "Resume" : "Pause"}</button>
        <div style={{ display: "flex", gap: 14, marginLeft: "auto", flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 10, height: 2, background: C.accent, display: "inline-block" }} />
            <Mono style={{ fontSize: 10 }}>sin θ · y-projection</Mono>
          </div>
          <div onClick={handleCosToggle} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", opacity: showCos ? 1 : 0.35, transition: "opacity 0.2s" }}>
            <span style={{ width: 10, height: 2, background: C.accentAlt, display: "inline-block" }} />
            <Mono style={{ fontSize: 10 }}>cos θ · x-projection (click to toggle)</Mono>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// INTERACTIVE — SINUSOIDAL FORM EXPLORER
// ─────────────────────────────────────────────────────────────
function SinusoidalExplorer() {
  const cvRef = useRef(null);
  const ARef = useRef(1);
  const omegaRef = useRef(1);
  const phiRef = useRef(0);
  const needsRedraw = useRef(true);
  const [A, setA] = useState(1);
  const [omega, setOmega] = useState(1);
  const [phi, setPhi] = useState(0);

  useEffect(() => {
    const cv = cvRef.current;
    if (!cv) return;
    const ctx = cv.getContext("2d");
    const W = 640, H = 210;

    const CC = {
      ax:   "rgba(126,184,212,0.13)",
      grid: "rgba(126,184,212,0.05)",
      wave: "#7eb8d4",
      amp:  "rgba(126,184,212,0.07)",
      lbl:  "rgba(239,239,239,0.34)",
      eq:   "rgba(239,239,239,0.65)",
      tick: "rgba(239,239,239,0.18)",
    };

    const pL = 48, pR = 16, pT = 30, pB = 28;

    function drawGraph() {
      const a = ARef.current, w = omegaRef.current, p = phiRef.current;
      ctx.clearRect(0, 0, W, H);
      const gW = W - pL - pR, gH = H - pT - pB;
      const cy = pT + gH / 2;
      const ys = gH / 2 * 0.84;
      const tMax = 4 * Math.PI / w;

      // Amplitude band
      ctx.fillStyle = CC.amp;
      ctx.fillRect(pL, cy - a * ys, gW, 2 * a * ys);

      // Horizontal grid at ±1
      ctx.strokeStyle = CC.grid; ctx.lineWidth = 0.5; ctx.setLineDash([3, 3]);
      [-1, 1].forEach(v => {
        ctx.beginPath(); ctx.moveTo(pL, cy - v * ys); ctx.lineTo(W - pR, cy - v * ys); ctx.stroke();
      });
      ctx.setLineDash([]);

      // Axes
      ctx.strokeStyle = CC.ax; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(pL, cy); ctx.lineTo(W - pR, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pL, pT); ctx.lineTo(pL, H - pB); ctx.stroke();

      // Period tick marks
      const period = 2 * Math.PI / w;
      for (let k = 1; k <= 4; k++) {
        const tx = pL + gW * (k * period / tMax);
        if (tx <= W - pR) {
          ctx.strokeStyle = CC.tick; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(tx, cy - 3); ctx.lineTo(tx, cy + 3); ctx.stroke();
          ctx.font = "9px monospace"; ctx.fillStyle = CC.tick; ctx.textAlign = "center";
          ctx.fillText(k + "T", tx, cy + 14);
        }
      }

      // Wave
      ctx.beginPath(); ctx.strokeStyle = CC.wave; ctx.lineWidth = 2;
      for (let i = 0; i <= gW; i++) {
        const t = tMax * (i / gW);
        const wy = cy - a * Math.sin(w * t + p) * ys;
        i === 0 ? ctx.moveTo(pL + i, wy) : ctx.lineTo(pL + i, wy);
      }
      ctx.stroke();

      // y-axis labels
      ctx.font = "10px monospace"; ctx.fillStyle = CC.lbl; ctx.textAlign = "right";
      ctx.fillText("+" + a.toFixed(1), pL - 5, cy - a * ys + 4);
      ctx.fillText("-" + a.toFixed(1), pL - 5, cy + a * ys + 4);
      ctx.fillText("0", pL - 5, cy + 4);

      // Equation label
      const ps = Math.abs(p) < 0.01 ? "" : (p > 0 ? " + " + p.toFixed(2) : " − " + Math.abs(p).toFixed(2));
      ctx.fillStyle = CC.eq; ctx.font = "13px monospace"; ctx.textAlign = "left";
      ctx.fillText("y = " + a.toFixed(1) + " · sin(" + w.toFixed(1) + "t" + ps + ")", pL + 6, pT - 8);
    }

    let rafId;
    function loop() {
      if (needsRedraw.current) { drawGraph(); needsRedraw.current = false; }
      rafId = requestAnimationFrame(loop);
    }
    needsRedraw.current = true;
    rafId = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafId);
  }, []);

  const update = (setter, ref, val) => { setter(val); ref.current = val; needsRedraw.current = true; };

  const T = (2 * Math.PI / omega).toFixed(2);
  const f = (omega / (2 * Math.PI)).toFixed(3);

  return (
    <div style={{ background: C.elevated, border: `1px solid ${C.border}`, borderRadius: DS.radius, overflow: "hidden" }}>
      <canvas ref={cvRef} width={640} height={210} style={{ display: "block", width: "100%" }} />
      <div style={{ padding: "14px 16px", borderTop: `1px solid ${C.border}` }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20 }}>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7 }}>
              <Mono style={{ color: C.accent, fontSize: 11 }}>A — amplitude</Mono>
              <Mono style={{ color: C.heading, fontSize: 11 }}>{A.toFixed(1)}</Mono>
            </div>
            <input type="range" min="0.2" max="2" step="0.1" value={A}
              onChange={e => update(setA, ARef, parseFloat(e.target.value))} />
          </div>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7 }}>
              <Mono style={{ color: C.accent, fontSize: 11 }}>ω — angular freq</Mono>
              <Mono style={{ color: C.heading, fontSize: 11 }}>{omega.toFixed(1)} rad/s</Mono>
            </div>
            <input type="range" min="0.5" max="4" step="0.1" value={omega}
              onChange={e => update(setOmega, omegaRef, parseFloat(e.target.value))} />
            <Mono style={{ fontSize: 9, display: "block", marginTop: 5 }}>T = {T}s · f = {f} Hz</Mono>
          </div>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7 }}>
              <Mono style={{ color: C.accent, fontSize: 11 }}>φ — phase shift</Mono>
              <Mono style={{ color: C.heading, fontSize: 11 }}>{phi.toFixed(2)} rad</Mono>
            </div>
            <input type="range" min="-3.14" max="3.14" step="0.05" value={phi}
              onChange={e => update(setPhi, phiRef, parseFloat(e.target.value))} />
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MC FIELD (from Probset_Format_v2 — lecture & practice)
// ─────────────────────────────────────────────────────────────
function MCField({ question, choices, correct, pts = 3, diff = 1, explain }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [showExplain, setShowExplain] = useState(false);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <Tag>MC</Tag>
          <Dots filled={diff} />
        </div>
        <Mono style={{ fontSize: 10 }}>{pts} pts</Mono>
      </div>
      <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.65, marginBottom: 14 }}>{question}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
        {choices.map((ch, i) => {
          const L = ["A","B","C","D"][i];
          const on = selected === i;
          const ok = revealed && i === correct;
          const bad = revealed && on && i !== correct;
          return (
            <div key={i} onClick={() => !revealed && setSelected(i)} style={{
              display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",

              <Label style={{ display: "block", marginBottom: 14 }}>Standard Values</Label>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", fontFamily: F.mono, fontSize: 11, fontWeight: 300 }}>
                  <thead>
                    <tr>
                      {["θ (deg)", "θ (rad)", "sin θ", "cos θ"].map((h, i) => (
                        <th key={i} style={{ padding: "8px 10px", textAlign: "center", color: C.dim, borderBottom: `1px solid ${C.border}`, fontWeight: 400, fontSize: 10 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      ["0°","0","0","1"],
                      ["30°","π/6","1/2","√3/2"],
                      ["45°","π/4","√2/2","√2/2"],
                      ["60°","π/3","√3/2","1/2"],
                      ["90°","π/2","1","0"],
                      ["120°","2π/3","√3/2","−1/2"],
                      ["135°","3π/4","√2/2","−√2/2"],
                      ["150°","5π/6","1/2","−√3/2"],
                      ["180°","π","0","−1"],
                      ["270°","3π/2","−1","0"],
                      ["360°","2π","0","1"],
                    ].map((row, ri) => (
                      <tr key={ri}>
                        {row.map((v, ci) => (
                          <td key={ci} style={{ padding: "7px 10px", textAlign: "center", color: ci <= 1 ? C.accent : C.body, borderBottom: `1px solid ${C.border}` }}>{v}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Reconstruction Method</Label>
              <p style={{ fontFamily: F.serif, fontSize: 14, color: C.body, lineHeight: 1.75, marginBottom: 10 }}>
                To find sin or cos of any standard angle without a table:
              </p>
              {[
                { k: "Step 1", v: "Find the reference angle: the acute angle between the terminal side and the x-axis." },
                { k: "Step 2", v: "Evaluate sin/cos of the reference angle using the 30-60-90 or 45-45-90 triangle." },
                { k: "Step 3", v: "Apply the sign for the quadrant: Q I (+,+), Q II (−,+), Q III (−,−), Q IV (+,−)." },
              ].map(({ k, v }) => <InfoRow key={k} label={k} value={v} />)}
            </Card>

            <Card>
              <Label style={{ display: "block", marginBottom: 14 }}>Physical Correspondences</Label>
              {[
                { k: "Spring: ω = √(k/m)", v: "k is spring constant (N/m), m is mass (kg). Stiffer spring → higher ω → shorter period." },
                { k: "Pendulum: ω = √(g/L)", v: "g is gravitational acceleration, L is length. Shorter pendulum → shorter period." },
                { k: "Energy: E = ½kA²", v: "For spring-mass. Total energy set by amplitude alone; constant throughout motion." },
                { k: "x²/A² + v²/(Aω)² = 1", v: "Position-velocity relation at any instant (Pythagorean identity in disguise)." },
              ].map(({ k, v }) => <InfoRow key={k} label={k} value={v} />)}
            </Card>

          </div>
        )}

        {/* Footer */}
        <div style={{ marginTop: 56, borderTop: `1px solid ${C.border}`, paddingTop: 18, display: "flex", justifyContent: "space-between" }}>
          <Mono style={{ fontSize: 9 }}>trigonometry · foundations · periodic motion</Mono>
          <Mono style={{ fontSize: 9, color: C.dim }}>use the reference tab as a formula sheet</Mono>
        </div>

      </div>
    </>
  );
}




ReactDOM.createRoot(document.getElementById('root')).render(<TrigBridgeL01 />);
